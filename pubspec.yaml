name: foodbank_app
description: "Food Bank"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  go_router: ^17.1.0
  drift: ^2.32.0
  drift_flutter: ^0.3.0
  path_provider: ^2.1.5
  riverpod: ^3.2.1
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0
  flutter_riverpod: ^3.3.1
  mask_text_input_formatter: ^2.9.0
  openfoodfacts: ^3.30.2
  mobile_scanner: ^7.2.0
  vibration: ^3.1.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  drift_dev: ^2.32.0
  build_runner: ^2.12.2
  freezed: ^3.2.5
  json_serializable: ^6.13.0

flutter:
  uses-material-design: true

